<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/><title>PetWell · Bookings</title><link rel="stylesheet" href="style.css"/></head>
<body><div class="admin-wrap"><aside class="admin-sidebar"></aside><div class="admin-main">
  <div class="admin-topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <a href="admindash.html" class="back-btn" style="background:var(--sky2);color:var(--teal)">‹</a>
      <h1>Bookings</h1>
    </div>
    <button class="btn btn-teal btn-sm" style="width:auto" onclick="openModal('addM')">+ New Booking</button>
  </div>
  <div class="admin-content">
    <div class="pill-row fade-up" style="margin-bottom:16px">
      <button class="pill on" onclick="setTab('',this)">All</button>
      <button class="pill" onclick="setTab('Pending',this)">Pending</button>
      <button class="pill" onclick="setTab('Confirmed',this)">Confirmed</button>
      <button class="pill" onclick="setTab('Completed',this)">Completed</button>
      <button class="pill" onclick="setTab('Cancelled',this)">Cancelled</button>
    </div>
    <div class="tbl-wrap fade-up">
      <table><thead><tr><th>#</th><th>Pet</th><th>Owner</th><th>Service</th><th>Date / Time</th><th>Status</th><th>Update</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="7" style="text-align:center;padding:40px"><div class="spin"></div></td></tr></tbody></table>
    </div>
  </div>
</div></div>

<div class="overlay hidden" id="addM"><div class="modal"><div class="modal-handle"></div>
  <div class="modal-head"><h2>New Booking</h2><button class="modal-close" onclick="closeModal('addM')">✕</button></div>
  <div class="modal-body">
    <div class="frow2">
      <div class="form-group"><label>Owner Name *</label><input class="input" id="aO" placeholder="Kamal Perera"/></div>
      <div class="form-group"><label>Pet Name *</label><input class="input" id="aP" placeholder="Bruno"/></div>
    </div>
    <div class="frow2">
      <div class="form-group"><label>Service *</label><select class="input" id="aS"><option value="">Select…</option><option>Grooming</option><option>Veterinary</option><option>Boarding</option><option>Training</option><option>Day Care</option><option>Bath & Spa</option></select></div>
      <div class="form-group"><label>Date *</label><input class="input" id="aD" type="date"/></div>
    </div>
    <div class="form-group"><label>Time</label><select class="input" id="aT"><option value="">Any time</option><option>9:00 AM</option><option>10:00 AM</option><option>11:00 AM</option><option>2:00 PM</option><option>3:00 PM</option><option>4:00 PM</option></select></div>
    <div class="form-group"><label>Notes</label><textarea class="input" id="aN" rows="2" placeholder="Any special instructions…"></textarea></div>
  </div>
  <div class="modal-foot"><button class="btn btn-teal" onclick="addBk()">Confirm Booking</button><button class="btn btn-outline" onclick="closeModal('addM')">Cancel</button></div>
</div></div>

<script>window.ACTIVE='adminbookings.html';</script><script src="adminnav.js"></script><script src="shared.js"></script>
<script type="module">
import{onAuth,logoutUser,addDocWithID,watch,updateDoc2,deleteDoc2}from'./firebase.js';
window.doLogout=async()=>{await logoutUser();location.href='adminlogin.html';};
onAuth(u=>{if(!u){location.href='adminlogin.html';return;}});
const BS={Pending:'badge-yellow',Confirmed:'badge-blue',Completed:'badge-green',Cancelled:'badge-red'};
let all=[],tab='';
watch('bookings',snap=>{
  all=[];snap.forEach(d=>all.push({id:d.id,...d.data()}));
  all.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));render();
});
function render(){
  const list=tab?all.filter(b=>b.status===tab):all;
  const tb=document.getElementById('tbody');
  if(!list.length){tb.innerHTML='<tr><td colspan="7" style="text-align:center;padding:36px;color:var(--text-mute)">No bookings found</td></tr>';return;}
  tb.innerHTML=list.map(b=>`<tr>
    <td style="font-size:.72rem;color:var(--text-mute);font-weight:700">${b.id.slice(0,6).toUpperCase()}</td>
    <td><strong>${b.petName||'—'}</strong></td>
    <td>${b.ownerName||'—'}</td>
    <td>${b.service||'—'}</td>
    <td class="text-mute" style="font-size:.82rem">${b.date||'—'}${b.time?' · '+b.time:''}</td>
    <td><span class="badge ${BS[b.status]||'badge-yellow'}">${b.status||'Pending'}</span></td>
    <td>
      <select class="input" style="padding:5px 8px;width:128px;font-size:.78rem" onchange="upd('${b.id}',this.value)">
        <option ${b.status==='Pending'?'selected':''}>Pending</option>
        <option ${b.status==='Confirmed'?'selected':''}>Confirmed</option>
        <option ${b.status==='Completed'?'selected':''}>Completed</option>
        <option ${b.status==='Cancelled'?'selected':''}>Cancelled</option>
      </select>
    </td>
  </tr>`).join('');
}
window.setTab=function(t,el){tab=t;document.querySelectorAll('.pill').forEach(b=>b.classList.remove('on'));el.classList.add('on');render();};
window.addBk=async function(){
  const o=document.getElementById('aO').value.trim(),p=document.getElementById('aP').value.trim(),s=document.getElementById('aS').value,d=document.getElementById('aD').value;
  if(!o||!p||!s||!d){toast('Fill all required fields','err');return;}
  await addDocWithID('bookings',{ownerName:o,petName:p,service:s,date:d,time:document.getElementById('aT').value,notes:document.getElementById('aN').value.trim(),status:'Pending'});
  closeModal('addM');toast('Booking created!','ok');
  ['aO','aP','aS','aD','aT','aN'].forEach(i=>document.getElementById(i).value='');
};
window.upd=async function(id,status){await updateDoc2('bookings',id,{status});toast('Status updated ✓','ok');};
</script></body></html>
