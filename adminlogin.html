<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/><title>PetWell · Admin</title><link rel="stylesheet" href="style.css"/>
<style>body{background:linear-gradient(160deg,var(--teal) 0%,var(--teal-lt) 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}.logo-name{color:var(--teal)!important;}</style></head>
<body><div class="login-card fade-up">
  
  <div class="login-logo"><span class="logo-emo">🛠</span><div class="logo-name">Admin Portal</div><div class="logo-sub">PetWell Management System</div></div>
  <div class="form-group"><label>Email</label><input class="input" id="em" type="email" placeholder="admin@petwell.lk"/></div>
  <div class="form-group"><label>Password</label><input class="input" id="pw" type="password" placeholder="••••••••"/></div>
  <button class="btn btn-teal" id="btn" onclick="doLogin()">Access Dashboard</button>
</div>
<script src="shared.js"></script>
<script type="module">
import{loginUser,onAuth}from'./firebase.js';
onAuth(u=>{if(u)location.href='admindash.html';});
window.doLogin=async function(){
  const e=document.getElementById('em').value.trim(),p=document.getElementById('pw').value;
  if(!e||!p){toast('Enter credentials','err');return;}
  const b=document.getElementById('btn');b.textContent='Signing in…';b.disabled=true;
  try{await loginUser(e,p);location.href='admindash.html';}
  catch{toast('Invalid credentials','err');b.textContent='Access Dashboard';b.disabled=false;}
};
document.addEventListener('keydown',e=>{if(e.key==='Enter')window.doLogin();});
</script></body></html>
