<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/><title>PetWell · Feedback</title><link rel="stylesheet" href="style.css"/></head>
<body><div class="admin-wrap"><aside class="admin-sidebar"></aside><div class="admin-main">
  <div class="admin-topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <a href="admindash.html" class="back-btn" style="background:var(--sky2);color:var(--teal)">‹</a>
      <h1>Customer Feedback</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="avgTag" class="badge badge-yellow" style="font-size:.85rem">⭐ — avg</span>
    </div>
  </div>
  <div class="admin-content">
    <div id="fbList" class="fade-up"><div class="spin"></div></div>
  </div>
</div></div>

<script>window.ACTIVE='adminfeedback.html';</script><script src="adminnav.js"></script><script src="shared.js"></script>
<script type="module">
import{onAuth,logoutUser,watch,deleteDoc2}from'./firebase.js';
window.doLogout=async()=>{await logoutUser();location.href='adminlogin.html';};
onAuth(u=>{if(!u){location.href='adminlogin.html';return;}});
watch('feedback',snap=>{
  const all=[];snap.forEach(d=>all.push({id:d.id,...d.data()}));
  all.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  if(all.length){
    const avg=(all.reduce((s,f)=>s+(Number(f.rating)||5),0)/all.length).toFixed(1);
    document.getElementById('avgTag').textContent='⭐ '+avg+' avg ('+all.length+' reviews)';
  }
  const el=document.getElementById('fbList');
  if(!all.length){el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--text-mute)"><div style="font-size:3rem;margin-bottom:12px">💬</div><p>No feedback received yet.</p></div>';return;}
  el.innerHTML=all.map(f=>`
    <div class="card fade-up" style="margin-bottom:12px;border-left:3px solid var(--amber)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-weight:700;font-size:.95rem">${f.ownerName||'Anonymous'}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
            <span style="font-size:1rem">${'⭐'.repeat(Math.min(5,Math.max(1,Number(f.rating)||5)))}</span>
            <span class="badge badge-teal" style="font-size:.68rem">${f.service||'General'}</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="text-mute" style="font-size:.74rem">${fmtDate(f.createdAt)}</span>
          <button onclick="delFb('${f.id}')" style="background:var(--sky2);border:none;width:30px;height:30px;border-radius:8px;cursor:pointer;color:var(--red);font-size:.85rem;display:flex;align-items:center;justify-content:center">✕</button>
        </div>
      </div>
      <div style="font-size:.875rem;color:var(--text-mid);font-style:italic;line-height:1.7">"${f.comment||''}"</div>
    </div>`).join('');
});
window.delFb=function(id){confirm2('Remove this review?',async()=>{await deleteDoc2('feedback',id);toast('Removed','inf');});};
</script></body></html>
